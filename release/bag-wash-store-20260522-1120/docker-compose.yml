services:
  postgres:
    image: postgres:16-alpine
    container_name: bagwash-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: bagwash
      POSTGRES_PASSWORD: bagwash
      POSTGRES_DB: bagwash
    volumes:
      - bagwash_pg_data:/var/lib/postgresql/data

volumes:
  bagwash_pg_data:
